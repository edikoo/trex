name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all targets
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64-modern   index.js --outfile dist/trex-linux-x64
          bun build --compile --target=bun-linux-arm64         index.js --outfile dist/trex-linux-arm64
          bun build --compile --target=bun-darwin-x64          index.js --outfile dist/trex-macos-x64
          bun build --compile --target=bun-darwin-arm64        index.js --outfile dist/trex-macos-arm64

      - name: Compress binaries
        run: |
          cd dist
          for f in trex-*; do
            gzip -k "$f"
            sha256sum "$f.gz" >> ../checksums.txt
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/trex-linux-x64.gz
            dist/trex-linux-arm64.gz
            dist/trex-macos-x64.gz
            dist/trex-macos-arm64.gz
            checksums.txt

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
